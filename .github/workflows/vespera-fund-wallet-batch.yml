name: Vespera fund wallet batch

on:
  workflow_dispatch:
    inputs:
      wallet_batch:
        description: "Wallet batch to fund, e.g. 01 or batch-01."
        required: true
        default: "01"
        type: string
      wallet_offset:
        description: "0-based offset inside the selected wallet batch."
        required: false
        default: "0"
        type: string
      wallet_limit:
        description: "How many wallets to inspect/fund from the selected batch."
        required: false
        default: "10"
        type: string
      min_balance_celo:
        description: "Skip wallets with at least this much CELO."
        required: false
        default: "0.02"
        type: string
      target_balance_celo:
        description: "Top up low wallets toward this CELO balance."
        required: false
        default: "0.05"
        type: string
      max_topup_celo:
        description: "Maximum CELO sent to a single wallet in one run."
        required: false
        default: "0.05"
        type: string
      dry_run:
        description: "Plan only. Set false to send real Celo mainnet transfers."
        required: true
        default: true
        type: boolean
      confirm_mainnet:
        description: "Required with dry_run=false. Confirms this sends CELO on mainnet."
        required: true
        default: false
        type: boolean

permissions:
  contents: read

concurrency:
  group: vespera-fund-wallet-batch
  cancel-in-progress: false

jobs:
  fund:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Fund selected wallet batch
        env:
          FUNDER_PRIVATE_KEY: ${{ secrets.VESPERA_FUNDER_PRIVATE_KEY }}
          RPC_URL: ${{ secrets.CELO_RPC_URL || vars.CELO_RPC_URL || 'https://forno.celo.org' }}
          WALLET_BATCH: ${{ inputs.wallet_batch }}
          WALLET_OFFSET: ${{ inputs.wallet_offset }}
          WALLET_LIMIT: ${{ inputs.wallet_limit }}
          MAX_WALLETS_PER_RUN: ${{ vars.VESPERA_MAX_WALLETS_PER_RUN || '25' }}
          MIN_BALANCE_CELO: ${{ inputs.min_balance_celo }}
          TARGET_BALANCE_CELO: ${{ inputs.target_balance_celo }}
          MAX_TOPUP_CELO: ${{ inputs.max_topup_celo }}
          DRY_RUN: ${{ format('{0}', inputs.dry_run) }}
          CONFIRM_MAINNET: ${{ format('{0}', inputs.confirm_mainnet) }}
        run: |
          if [ "$DRY_RUN" = "false" ] && [ -z "$FUNDER_PRIVATE_KEY" ]; then
            echo "::error::VESPERA_FUNDER_PRIVATE_KEY secret is required for live funding."
            exit 1
          fi
          npm run tx:vespera:fund-batch
